<!doctype html>
<html lang="es">

        "https://instagram.com/arkup",
        "https://twitter.com/arkup",

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

      "name": "Ark-Up",
      "url": "https://arkup.com",

      }
    }
